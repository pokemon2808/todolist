<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Pro: Kategori & Waktu</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #9333ea);
            height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            padding: 30px; border-radius: 20px; width: 420px; color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h3 { text-align: center; margin-bottom: 20px; }

        .search-box { margin-bottom: 15px; }
        
        /* Layout Input & Dropdown */
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .row { display: flex; gap: 8px; }

        input, select {
            padding: 12px; border: none; border-radius: 10px;
            background: rgba(255, 255, 255, 0.2); color: white; outline: none;
        }
        option { background: #4b5563; color: white; }

        button#add-btn {
            padding: 12px; border: none; border-radius: 10px;
            background: #10b981; color: white; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        button#add-btn:hover { background: #059669; }

        ul { list-style: none; padding: 0; max-height: 350px; overflow-y: auto; }

        li {
            background: rgba(255, 255, 255, 0.1); margin-bottom: 12px;
            padding: 15px; border-radius: 12px; border-left: 6px solid #fff;
            position: relative; animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } }

        /* Warna Label Kategori */
        .badge {
            font-size: 10px; padding: 3px 8px; border-radius: 20px;
            text-transform: uppercase; font-weight: bold; margin-bottom: 5px; display: inline-block;
        }
        .cat-Kerja { background: #3b82f6; }
        .cat-Pribadi { background: #fbbf24; color: #000; }
        .cat-Penting { background: #ef4444; }

        .task-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .task-text { font-size: 16px; font-weight: 500; }
        .task-time { font-size: 11px; opacity: 0.7; margin-top: 8px; }
        
        .btn-hapus {
            background: rgba(255, 255, 255, 0.2); color: #ff9494; border: none; 
            padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
        }
        .btn-hapus:hover { background: #ff4d4d; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h3>🚀 Task Manager</h3>

    <div class="search-box">
        <input type="text" id="searchBar" placeholder="Cari berdasarkan tugas atau kategori..." onkeyup="filterTugas()" style="width: 93%;">
    </div>

    <div class="input-group">
        <div class="row">
            <input type="text" id="inputTugas" placeholder="Tugas baru..." style="flex: 2;">
            <select id="selectKategori" style="flex: 1;">
                <option value="Kerja">Kerja</option>
                <option value="Pribadi">Pribadi</option>
                <option value="Penting">Penting</option>
            </select>
        </div>
        <button id="add-btn" onclick="tambahTugas()">Tambah Tugas</button>
    </div>

    <ul id="daftarTugas"></ul>
</div>

<script>
    document.addEventListener('DOMContentLoaded', muatData);

    function tambahTugas() {
        const input = document.getElementById('inputTugas');
        const kategori = document.getElementById('selectKategori');
        
        if (input.value.trim() === '') return;

        const skrg = new Date();
        const waktuLengkap = skrg.toLocaleDateString('id-ID') + " | " + 
                            skrg.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});

        const tugasBaru = {
            teks: input.value,
            kategori: kategori.value,
            waktu: waktuLengkap,
            id: Date.now() // ID unik untuk hapus data lebih akurat
        };

        simpanKeLocalStorage(tugasBaru);
        buatElemenTugas(tugasBaru);
        
        input.value = '';
    }

    function buatElemenTugas(tugas) {
        const list = document.getElementById('daftarTugas');
        const li = document.createElement('li');
        li.setAttribute('data-id', tugas.id);
        
        // Atur warna border kiri berdasarkan kategori
        const warnaMap = { 'Kerja': '#3b82f6', 'Pribadi': '#fbbf24', 'Penting': '#ef4444' };
        li.style.borderLeftColor = warnaMap[tugas.kategori];

        li.innerHTML = `
            <span class="badge cat-${tugas.kategori}">${tugas.kategori}</span>
            <div class="task-header">
                <span class="task-text">${tugas.teks}</span>
                <button class="btn-hapus" onclick="hapusTugas(this)">Hapus</button>
            </div>
            <div class="task-time">🕒 ${tugas.waktu}</div>
        `;

        list.appendChild(li);
        updateNomor();
    }

    function hapusTugas(btn) {
        const item = btn.closest('li');
        const id = item.getAttribute('data-id');
        
        hapusDariLocalStorage(id);
        item.remove();
        updateNomor();
    }

    function updateNomor() {
        const tasks = document.querySelectorAll('.task-text');
        tasks.forEach((span, index) => {
            const teksMurni = span.innerText.replace(/^\d+\.\s/, '');
            span.innerText = `${index + 1}. ${teksMurni}`;
        });
    }

    function filterTugas() {
        const filter = document.getElementById('searchBar').value.toLowerCase();
        const items = document.querySelectorAll('#daftarTugas li');
        items.forEach(item => {
            const teks = item.innerText.toLowerCase(); // Cek teks dan kategori
            item.style.display = teks.includes(filter) ? "block" : "none";
        });
    }

    // --- LOCAL STORAGE ---
    function simpanKeLocalStorage(tugas) {
        let tasks = localStorage.getItem('proTasks') ? JSON.parse(localStorage.getItem('proTasks')) : [];
        tasks.push(tugas);
        localStorage.setItem('proTasks', JSON.stringify(tasks));
    }

    function muatData() {
        let tasks = localStorage.getItem('proTasks') ? JSON.parse(localStorage.getItem('proTasks')) : [];
        tasks.forEach(tugas => buatElemenTugas(tugas));
    }

    function hapusDariLocalStorage(id) {
        let tasks = JSON.parse(localStorage.getItem('proTasks'));
        const filterTasks = tasks.filter(t => t.id != id);
        localStorage.setItem('proTasks', JSON.stringify(filterTasks));
    }
</script>

</body>
</html>
